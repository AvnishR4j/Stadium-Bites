<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="#0f0f13"/>

  <!-- Cricket bat (angled) -->
  <g transform="translate(50,50) rotate(-40) translate(-50,-50)">
    <!-- Blade -->
    <rect x="42" y="15" width="16" height="42" rx="5" fill="#f97316"/>
    <!-- Shoulder highlight -->
    <rect x="42" y="15" width="16" height="8" rx="5" fill="#fb923c"/>
    <!-- Handle -->
    <rect x="46" y="57" width="8" height="22" rx="3" fill="#78350f"/>
    <!-- Grip tape stripes -->
    <rect x="46" y="59" width="8" height="2.5" rx="1" fill="#fbbf24" opacity="0.7"/>
    <rect x="46" y="64" width="8" height="2.5" rx="1" fill="#fbbf24" opacity="0.7"/>
    <rect x="46" y="69" width="8" height="2.5" rx="1" fill="#fbbf24" opacity="0.7"/>
  </g>

  <!-- Cricket ball -->
  <circle cx="67" cy="30" r="13" fill="#dc2626"/>
  <!-- Ball shine -->
  <circle cx="63" cy="26" r="4" fill="#ef4444" opacity="0.5"/>
  <!-- Ball seam curve left -->
  <path d="M57 27 Q62 30 57 33" stroke="#fbbf24" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Ball seam curve right -->
  <path d="M77 27 Q72 30 77 33" stroke="#fbbf24" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
